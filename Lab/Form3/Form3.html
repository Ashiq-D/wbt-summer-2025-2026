<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Two</title>
</head>

<body>

  <form class="card">

    <h2>Create your account</h2>
    <p>Join us in a couple of steps.</p>
    <div class="field">
      <label for="fname">Full Name</label>
      <input type="text" id="fname" name="fname" placeholder="Jace Targaryen" required>
    </div>
    <div class="field">
      <label for="age">Age</label>
      <input type="number" id="age" name="age" placeholder="18" required>
    </div>
    <div class="field">
      <label for="dob">Date of Birth</label>
      <input type="dateoftime" id="dob" name="dob" required>
    </div>
    <div class="field">
      <label for="email">Email Address  </label>
      <input type="email" id="email" name="email" placeholder="jace@example.com" required />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="*******" required />
    </div>
    <div class="R-field">
      <label for="contact">Preferred Contact
        <input type="radio" name="email" value="email"> Email
        <input type="radio" name="pn" value="pn" >Phone
        <input type="radio" name="sms" value="sms" >SMS
    </label>
    </div>
    <div class="S-field">
      <button type="submit" class="b1">Submit</button>
      <button type="reset" class="b2">Reset</button>
    </div>

  </form>



</body>

</html>
