<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Mark Zuckerberg</title>
</head>

<body>



  <form method="post">


      <h1>Donor Information</h1>

      <table>
        <tr>
          <td><label for="firstName">First Name*</label></td>
          <td><input type="text" id="firstName" name="firstName" required></td>
        </tr>
        <tr>
          <td><label for="lastName">Last Name*</label></td>
          <td><input type="text" id="lastName" name="lastName" required></td>
        </tr>
         <tr>
          <td><label for="company">Company</label></td>
          <td><input type="text" id="company" name="company" ></td>
        </tr>
        <tr>
        <tr>
          <td><label for="add1">Address 1*</label></td>
          <td><input type="text" id="add1" name="add1" required></td>
        </tr>

         <tr>
          <td><label for="add2">Address 2</label></td>
          <td><input type="text" id="add2" name="add2" ></td>
        </tr>
        <tr>
          <td><label for="city">City*</label></td>
          <td><input type="text" id="city" name="city" required></td>
        </tr>

        <tr>
          <td><label for="state">State*</label><br></td>
          <td><select id="state" name="state" required>
              <option value="">-- Select a State --</option>
              <option value="dhaka">Dhaka</option>
              <option value="khulna">Khulna</option>
              <option value="rajshahi">Rajshahi</option>
            </select></td>
        </tr>

        <tr>
          <td><label for="zip">Zip Code*</label></td>
          <td><input type="number" id="zip" name="zip" required></td>
        </tr>

        <tr>
          <td><label for="country">Country*</label><br></td>
          <td><select id="country" name="country" required>
              <option value="">-- Select a Country --</option>
              <option value="bangladesh">Bangladesh</option>
              <option value="india">India</option>
              <option value="china">China</option>
            </select></td>
        </tr>
        <tr>
          <td><label for="pn">Phone</label></td>
          <td><input type="number" id="pn" name="pn" required></td>
        </tr>

        <tr>
          <td><label for="fax">Fax</label></td>
          <td><input type="number" id="fax" name="fax" required></td>
        </tr>

        <tr>
          <td><label for="email">Email*</label></td>
          <td><input type="email" id="email" name="email" required></td>
        </tr>
        <tr>
          <td><label>Donation Amount:</label><br>
            (Check a button or type in your amount)
        </td>
          <td>
            <label><input type="radio" name="da" value="none" required> None</label>
            <label><input type="radio" name="da" value="50" > $50</label>
            <label><input type="radio" name="da" value="75"> $75</label>
            <label><input type="radio" name="da" value="100"> $100</label>
            <label><input type="radio" name="da" value="250"> $250</label>
            <label><input type="radio" name="da" value="other"> Other</label>
          
          <tr>
            <td></td>
          <td><label for="otheramount">Other Amount $ </label>
          <input type="number" id="otheramount" name="otheramount"></td>
          </tr> 
          </td>
        </tr>
        <tr>
          <td><label for="rd">Required Donation</label><br>
            (Check if yes)
        </td>
          <td>
            <label><input type="checkbox" name="rd" value="i-am-interested-in"> I am interseted in giving on' a regular basis</label>
          </td>
        </tr>
        <tr>
          <td> </td>
          <td>Monthly Credit Card $
            <input type="number" name="monthly_amount" >For
            <input type="number" name="months" >Months
          </td>
        </tr>
        <tr>
          <td></td>
          <td><button type="reset">Reset</button>
          <button type="continue">continue</button></td>
        </tr>
      </table>

      </table>

  </form>



</body>

</html>
